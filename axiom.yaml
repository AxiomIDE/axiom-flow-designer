name: axiom-official/axiom-flow-designer
version: 0.1.0
language: python
description: Designs and compiles Axiom flow graphs from natural language goals. Searches the marketplace for existing nodes, assembles them into a graph, compiles it via the registry, tests it with a synthetic invocation, and self-corrects on failure.
author: Axiom Official
license: MIT
nodes:
    - name: FlowIntentClassifier
      description: Parses the user's goal and produces a FlowSpec with an initial description and list of candidate node names to search for.
      input: AgentRequest
      output: FlowSpec
      required_secrets:
        - ANTHROPIC_API_KEY
    - name: NodeResolver
      description: Searches the marketplace for each candidate node, resolves their ULIDs and proto schemas, and populates FlowSpec.graph_json with the resolved node information.
      input: FlowSpec
      output: FlowSpec
    - name: GraphAssembler
      description: Uses the LLM to assemble the resolved nodes into a valid React Flow graph JSON (graph_json) with correct edge connections and edge plan adapters.
      input: FlowSpec
      output: FlowSpec
      required_secrets:
        - ANTHROPIC_API_KEY
    - name: FlowCompiler
      description: Calls POST /app/graphs/compile on the BFF to compile and store the flow, returning a CompileResult with the artifact_id.
      input: FlowSpec
      output: CompileResult
    - name: FlowTestInvoker
      description: Invokes the compiled flow via POST /app/run with synthetic input and returns a TestResult with the execution_id for debug event inspection.
      input: CompileResult
      output: TestResult
    - name: FlowErrorAnalyser
      description: Reads debug events for the test execution, diagnoses graph topology or data mapping errors, and produces fix_instructions for GraphAssembler. Sets has_error=false when the test passes.
      input: TestResult
      output: AnalysisResult
      required_secrets:
        - ANTHROPIC_API_KEY
    - name: FlowResult
      description: Terminal node. Returns the artifact_id in AgentProgress.artifact_id on success.
      input: AnalysisResult
      output: AgentProgress
imports:
    - package: axiom-official/axiom-agent-messages
      version: 0.1.0
      messages:
        - AgentRequest
        - PackageSpec
        - FlowSpec
        - CompileResult
        - AnalysisResult
        - AgentProgress
        - NodeSpec
        - PublishResult
        - TestResult
